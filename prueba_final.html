<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Prueba definitiva SVG</title>
    <style>
        .container { position: relative; width: 100%; max-width: 692px; margin: 0 auto; border: 2px solid red; }
        .container img { width: 100%; height: auto; display: block; }
        .container svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        button { margin: 20px; padding: 10px 20px; background: #6674FF; color: white; border: none; border-radius: 8px; cursor: pointer; }
        textarea { width: 100%; height: 200px; margin-top: 20px; font-family: monospace; }
    </style>
</head>
<body>
    <h2>Prueba: ¿Se ven los colores?</h2>
    <div class="container" id="container">
        <img id="img" src="https://raw.githubusercontent.com/Boulder-coder/guia-escalada/main/fotos/MLC_ESTE_B8_1.jpg" crossorigin="anonymous">
        <svg id="svg" viewBox="0 0 692 768"></svg>
    </div>
    <button id="btn">Aplicar colores ROJO y AZUL</button>
    <textarea id="log" placeholder="Log..."></textarea>

    <script>
        const svgUrl = 'https://raw.githubusercontent.com/Boulder-coder/guia-escalada/main/fotos/MLC_ESTE_B8_1.svg';
        const container = document.getElementById('container');
        const svgElement = document.getElementById('svg');
        const log = document.getElementById('log');
        
        function logMsg(msg) {
            log.value += msg + '\n';
            console.log(msg);
        }
        
        // Cargar el SVG
        fetch(svgUrl)
            .then(res => res.text())
            .then(svgText => {
                logMsg('✅ SVG cargado');
                // Limpiar y extraer solo los paths y circles, sin grupos ni defs
                const parser = new DOMParser();
                const doc = parser.parseFromString(svgText, 'image/svg+xml');
                const elementos = doc.querySelectorAll('path, circle');
                logMsg(`📊 Elementos encontrados: ${elementos.length}`);
                
                // Copiar los elementos al SVG de prueba
                elementos.forEach(el => {
                    const clone = el.cloneNode(true);
                    svgElement.appendChild(clone);
                });
                logMsg('✅ Elementos copiados al SVG de prueba');
            })
            .catch(err => logMsg('❌ Error: ' + err));
        
        // Botón para cambiar colores
        document.getElementById('btn').onclick = () => {
            // Buscar círculo A_entrada y cambiar a ROJO
            const circuloA = svgElement.querySelector('[inkscape\\:label="A_entrada"]');
            if (circuloA) {
                circuloA.setAttribute('fill', '#FF0000');
                circuloA.setAttribute('stroke', '#FF0000');
                logMsg('🔴 Círculo A_entrada cambiado a ROJO');
            } else {
                logMsg('❌ No se encontró A_entrada');
            }
            
            // Buscar círculo A_salida y cambiar a AZUL
            const circuloA2 = svgElement.querySelector('[inkscape\\:label="A_salida"]');
            if (circuloA2) {
                circuloA2.setAttribute('fill', '#0000FF');
                circuloA2.setAttribute('stroke', '#0000FF');
                logMsg('🔵 Círculo A_salida cambiado a AZUL');
            } else {
                logMsg('❌ No se encontró A_salida');
            }
        };
    </script>
</body>
</html>
